- content: '[Unit]

    Description=MahaGuardian Agent alpha

    After=network.target


    [Service]

    Type=simple

    User=mahaguardian

    Group=mahaguardian

    WorkingDirectory=/home/mahaguardian

    # No passphrase (unencrypted keys)

    Environment=AGENT_ID=alpha

    Environment=MAHAGUARDIAN_AGENT_PORT=8443

    Environment=MAHAGUARDIAN_PRODUCTION=true

    ExecStart=/home/mahaguardian/.venv/bin/python -m agent.main

    Restart=on-failure

    RestartSec=5


    [Install]

    WantedBy=multi-user.target

    '
