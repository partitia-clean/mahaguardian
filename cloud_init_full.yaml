#cloud-config
packages:
- python3
- python3-pip
- python3-venv
runcmd:
- mkdir -p /home/mahaguardian/.mahaguardian/certs/agents
- mkdir -p /home/mahaguardian/.mahaguardian/logs
- chmod 700 /home/mahaguardian/.mahaguardian
- python3 -m venv /home/mahaguardian/.venv
- /home/mahaguardian/.venv/bin/pip install --quiet fastapi 'uvicorn[standard]' pynacl pyrage websockets cryptography httpx pydantic
- chown -R mahaguardian:mahaguardian /home/mahaguardian
- systemctl daemon-reload
- systemctl enable mahaguardian-alpha
- systemctl start mahaguardian-alpha
- systemctl enable mahaguardian-beta
- systemctl start mahaguardian-beta
users:
- home: /home/mahaguardian
  name: mahaguardian
  shell: /bin/false
  system: true
