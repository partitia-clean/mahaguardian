name: Bug report
description: Report a reproducible bug in the public MahaGuardian codebase
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report.

        For security vulnerabilities, please use GitHub private vulnerability reporting or the process in SECURITY.md instead of this public form.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the issue
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or test case
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit, branch, or environment
      description: Commit SHA, branch name, or local environment details
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or related notes
