name: Documentation improvement
description: Suggest a documentation fix or gap
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the docs issue
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Where is the issue?
      description: File, section, or URL
      placeholder: README.md, docs/quickstart.md, SECURITY.md, etc.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
